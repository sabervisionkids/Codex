<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Codex</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root{
  color-scheme:dark;
  --bg:#0d0d0f;--bg2:#18181c;--bg3:#222228;--bg4:#2a2a32;
  --sf:rgba(255,255,255,.05);--sf2:rgba(255,255,255,.09);
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.15);
  --t1:#f0f0f5;--t2:#a0a0b0;--t3:#606070;--t4:#383845;
  --gold:#e8b84b;--gold2:#f5d080;--gold-bg:rgba(232,184,75,.12);--gold-bd:rgba(232,184,75,.28);
  --mj:#9b8de8;--mj-bg:rgba(155,141,232,.12);--mj-bd:rgba(155,141,232,.28);
  --green:#3dd68c;--green-bg:rgba(61,214,140,.12);--green-bd:rgba(61,214,140,.3);
  --orange:#ff9f40;--orange-bg:rgba(255,159,64,.12);--orange-bd:rgba(255,159,64,.28);
  --red:#c0524a;--red-bg:rgba(192,82,74,.1);--red-bd:rgba(192,82,74,.22);
  --blue:#4d9eff;--blue-bg:rgba(77,158,255,.12);--blue-bd:rgba(77,158,255,.3);
  --star:#ffb347;
  --sh0:0 1px 4px rgba(0,0,0,.4);--sh1:0 4px 20px rgba(0,0,0,.5);--sh2:0 12px 48px rgba(0,0,0,.7);
  --r:14px;--rs:10px;--rx:20px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);--sr:env(safe-area-inset-right,0px);
}
:root.light{
  color-scheme:light;
  --bg:#f5f5f7;--bg2:#fff;--bg3:#f0f0f5;--bg4:#e8e8f0;
  --sf:rgba(0,0,0,.04);--sf2:rgba(0,0,0,.07);
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.15);
  --t1:#0d0d0f;--t2:#505060;--t3:#909098;--t4:#c0c0cc;
  --gold:#b8860b;--gold2:#d4a820;--gold-bg:rgba(184,134,11,.1);--gold-bd:rgba(184,134,11,.28);
  --mj:#6050c8;--mj-bg:rgba(96,80,200,.1);--mj-bd:rgba(96,80,200,.28);
  --green:#1a9e5c;--green-bg:rgba(26,158,92,.1);--green-bd:rgba(26,158,92,.3);
  --orange:#d4780a;--orange-bg:rgba(212,120,10,.1);--orange-bd:rgba(212,120,10,.28);
  --red:#b04040;--red-bg:rgba(176,64,64,.08);--red-bd:rgba(176,64,64,.2);
  --blue:#0070e0;--blue-bg:rgba(0,112,224,.1);--blue-bd:rgba(0,112,224,.3);
  --star:#e09020;
  --sh0:0 1px 4px rgba(0,0,0,.1);--sh1:0 4px 20px rgba(0,0,0,.12);--sh2:0 12px 48px rgba(0,0,0,.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
button,input,textarea,select{font-family:inherit}

/* ── TAB BAR ─────────────────────────────────────────── */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--bg2);border-top:1px solid var(--bd);
  backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
  padding:8px var(--sr) calc(var(--sb)+6px) var(--sl);
  display:flex;justify-content:space-around;transition:background .3s,border-color .3s;
}
.tab{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;letter-spacing:.02em;color:var(--t3);padding:2px 20px;transition:color .2s;cursor:pointer}
.tab svg{width:24px;height:24px;stroke-width:1.8;transition:transform .2s}
.tab.on{color:var(--gold)}.tab.on svg{transform:scale(1.1)}

/* ── PAGES ───────────────────────────────────────────── */
.page{display:none;min-height:100dvh;background:var(--bg);padding-bottom:calc(var(--sb)+84px)}
.page.on{display:block}

/* ── HEADER ──────────────────────────────────────────── */
.hdr{
  position:sticky;top:0;z-index:100;background:var(--bg);
  padding:calc(var(--st)+14px) calc(20px + var(--sr)) 0 calc(20px + var(--sl));
  transition:background .3s,padding .2s;
}
.hdr.compact{padding-top:calc(var(--st)+8px)}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px;border-bottom:1px solid var(--bd)}
.brand{display:flex;align-items:baseline;gap:7px}
.brand-main{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;letter-spacing:-.5px;color:var(--t1);line-height:1;transition:font-size .2s}
.hdr.compact .brand-main{font-size:22px}
.brand-sub{font-size:11px;font-weight:500;color:var(--t3);letter-spacing:.08em;text-transform:uppercase}
.hdr-r{display:flex;align-items:center;gap:8px}
.user-sw{display:flex;background:var(--sf2);border-radius:20px;padding:3px;border:1px solid var(--bd)}
.user-btn{background:none;border:none;font-size:12px;font-weight:600;color:var(--t3);padding:5px 12px;border-radius:16px;transition:all .2s;white-space:nowrap;cursor:pointer}
.user-btn.m-on{background:var(--gold-bg);color:var(--gold);box-shadow:var(--sh0)}
.user-btn.j-on{background:var(--mj-bg);color:var(--mj);box-shadow:var(--sh0)}
.icon-btn{background:var(--sf2);border:1px solid var(--bd);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;cursor:pointer}
.icon-btn:active{transform:scale(.9)}
.notif-wrap{position:relative}
.notif-dot{position:absolute;top:-2px;right:-2px;width:10px;height:10px;background:var(--red);border-radius:50%;border:2px solid var(--bg);display:none}
.notif-dot.vis{display:block}

/* ── SEARCH ──────────────────────────────────────────── */
.srch-sec{
  padding:10px calc(16px + var(--sr)) 0 calc(16px + var(--sl));
  position:sticky;top:calc(var(--st) + 73px);z-index:99;background:var(--bg);transition:background .3s;
}
.srch-bar{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:0 14px;box-shadow:var(--sh0);transition:border-color .2s}
.srch-bar:focus-within{border-color:var(--gold)}
.srch-bar svg{color:var(--t3);flex-shrink:0;width:16px;height:16px}
.srch-in{flex:1;border:none;background:none;font-size:15px;color:var(--t1);padding:11px 0;outline:none;-webkit-appearance:none}
.srch-in::placeholder{color:var(--t3)}
.srch-x{background:none;border:none;color:var(--t3);font-size:16px;display:none;padding:4px;cursor:pointer}
.srch-x.vis{display:block}

/* ── PILLS (unified filter) ──────────────────────────── */
.pills-wrap{
  padding:8px calc(16px + var(--sr)) 6px calc(16px + var(--sl));
  position:sticky;top:calc(var(--st) + 119px);z-index:98;background:var(--bg);transition:background .3s;
}
.pills-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.pills-row::-webkit-scrollbar{display:none}
.pill{background:var(--bg2);border:1px solid var(--bd);border-radius:20px;font-size:13px;font-weight:500;color:var(--t2);padding:6px 14px;transition:all .18s;white-space:nowrap;flex-shrink:0;box-shadow:var(--sh0);cursor:pointer}
.pill.on{background:var(--gold);border-color:var(--gold);color:#0d0d0f;font-weight:700;box-shadow:0 2px 8px rgba(232,184,75,.35)}

/* ── TOOLBAR ─────────────────────────────────────────── */
.tbar{display:flex;align-items:center;justify-content:space-between;padding:4px calc(16px + var(--sr)) 8px calc(16px + var(--sl))}
.rcnt{font-size:12px;color:var(--t3);font-weight:500}
.tbar-r{display:flex;align-items:center;gap:6px}
.flt-btn{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--bd);border-radius:20px;font-size:12px;font-weight:600;color:var(--t2);padding:5px 12px;box-shadow:var(--sh0);transition:all .2s;cursor:pointer}
.flt-btn.on{border-color:var(--gold);color:var(--gold);background:var(--gold-bg)}
.flt-cnt{background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center}
.vtog{display:flex;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:3px;gap:2px;box-shadow:var(--sh0)}
.vbtn{background:none;border:none;border-radius:8px;padding:5px 9px;color:var(--t3);display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer}
.vbtn svg{width:15px;height:15px;stroke-width:2}
.vbtn.on{background:var(--sf2);color:var(--t1)}

/* ── FILTER DRAWER ───────────────────────────────────── */
.fdrawer{
  margin:0 calc(16px + var(--sr)) 10px calc(16px + var(--sl));
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);
  overflow:hidden;display:none;box-shadow:var(--sh1);
}
.fdrawer.on{display:block;animation:fslide .2s ease}
@keyframes fslide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.frow{padding:12px 14px;border-bottom:1px solid var(--bd)}.frow:last-child{border-bottom:none}
.flbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.fpills{display:flex;gap:5px;flex-wrap:wrap}
.fpill{background:var(--sf);border:1px solid var(--bd);border-radius:20px;font-size:12px;font-weight:500;color:var(--t2);padding:5px 12px;transition:all .15s;cursor:pointer}
.fpill.on{background:var(--gold);border-color:var(--gold);color:#0d0d0f;font-weight:700}
.fsel{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);color:var(--t1);padding:9px 12px;font-size:13px;outline:none;color-scheme:light dark;-webkit-appearance:none}
.fsel:focus{border-color:var(--gold)}
.fclr{background:none;border:none;color:var(--blue);font-size:13px;font-weight:500;width:100%;padding:10px;text-align:center;cursor:pointer}

/* ── BOOK LIST ───────────────────────────────────────── */
.blist{padding:0 calc(16px + var(--sr)) 0 calc(16px + var(--sl));display:flex;flex-direction:column;gap:1px}
.bitem{display:flex;align-items:flex-start;gap:14px;background:var(--bg2);padding:13px 14px;cursor:pointer;position:relative;transition:background .15s}
.bitem:first-child{border-radius:var(--r) var(--r) 0 0}.bitem:last-child{border-radius:0 0 var(--r) var(--r)}.bitem:only-child{border-radius:var(--r)}
.bitem:not(:last-child)::after{content:'';position:absolute;bottom:0;left:calc(14px + 56px + 14px);right:0;height:1px;background:var(--bd)}
.bitem:active{background:var(--bg3)}
.thumb{width:56px;height:80px;border-radius:6px;flex-shrink:0;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.tbg{position:absolute;inset:0}.thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s;z-index:1}.thumb img.ok{opacity:1}
.tem{font-size:24px;position:relative;z-index:0}
.binf{flex:1;min-width:0;padding-top:1px}
.btit{font-size:15px;font-weight:600;color:var(--t1);line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.baut{font-size:13px;color:var(--t3);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;transition:color .15s}
.baut:active{color:var(--blue)}
.bmeta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:4px}
.bmeta-tag{font-size:11px;color:var(--t3);font-weight:500}
.bmeta-sep{font-size:10px;color:var(--t4)}
.bmeta-saga{font-size:11px;color:var(--blue);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
.bstars{display:flex;align-items:center;gap:5px;margin-top:3px}
.stars{display:flex;gap:1px}
.si{font-size:11px;line-height:1}
.snum{font-size:12px;font-weight:700;color:var(--t2)}
.ssrc{font-size:10px;color:var(--t3)}
.rbadge{flex-shrink:0;font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;white-space:nowrap;margin-top:2px;line-height:1.4}
.rbadge.read{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.rbadge.reading{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-bd)}
.rbadge.next{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.rbadge.unread{background:var(--sf);color:var(--t3);border:1px solid var(--bd)}
.rbadge.wish{background:var(--mj-bg);color:var(--mj);border:1px solid var(--mj-bd)}

/* ── GRID VIEW ───────────────────────────────────────── */
.bgrid{padding:0 calc(16px + var(--sr)) 0 calc(16px + var(--sl));display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.gcrd{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rs);overflow:hidden;cursor:pointer;box-shadow:var(--sh0);transition:transform .15s;display:flex;flex-direction:column}
.gcrd:active{transform:scale(.95)}
.gcov{position:relative;overflow:hidden;aspect-ratio:2/3;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gcov-bg{position:absolute;inset:0}.gcov img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s;z-index:1}.gcov img.ok{opacity:1}
.gem{font-size:24px;position:relative;z-index:0}
.grdot{position:absolute;top:5px;right:5px;width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(0,0,0,.3);z-index:2}
.grdot.read{background:var(--green)}.grdot.reading{background:var(--orange)}.grdot.unread{background:var(--t4)}.grdot.next{background:var(--blue)}.grdot.wish{background:var(--mj)}
.ginf{padding:6px 7px 8px;flex:1}
.gtit{font-size:11px;font-weight:600;color:var(--t1);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
.gstars{display:flex;gap:1px}
.gsi{font-size:8px}

/* ── SAGA VIEW ───────────────────────────────────────── */
.saga-wrap{padding:0 calc(16px + var(--sr)) 0 calc(16px + var(--sl))}
.saga-blk{margin-bottom:24px}
.saga-hd{display:flex;align-items:baseline;gap:10px;padding:0 2px 8px}
.saga-nm{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--t1)}
.saga-ct{font-size:12px;color:var(--t3)}
.saga-prog{display:flex;gap:10px;padding:0 2px 10px}
.saga-pu{flex:1}
.saga-pl{font-size:10px;font-weight:600;margin-bottom:3px}
.saga-pl.m{color:var(--gold)}.saga-pl.j{color:var(--mj)}
.saga-pb{height:3px;background:var(--bd2);border-radius:2px;overflow:hidden}
.saga-pf{height:100%;border-radius:2px}.saga-pf.m{background:var(--gold)}.saga-pf.j{background:var(--mj)}
.saga-list{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh0)}
.saga-row{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;position:relative;transition:background .15s}
.saga-row:not(:last-child)::after{content:'';position:absolute;bottom:0;left:calc(12px+38px+10px);right:0;height:1px;background:var(--bd)}
.saga-row:active{background:var(--bg3)}
.saga-th{width:38px;height:54px;border-radius:4px;flex-shrink:0;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;box-shadow:var(--sh0)}
.saga-th-bg{position:absolute;inset:0}.saga-th img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s;z-index:1}.saga-th img.ok{opacity:1}
.saga-th-em{font-size:16px;position:relative;z-index:0}
.saga-vol{font-size:11px;font-weight:700;color:var(--t4);width:16px;flex-shrink:0;text-align:center}
.saga-inf{flex:1;min-width:0}
.saga-tit{font-size:13px;font-weight:500;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.saga-aut{font-size:11px;color:var(--t3)}

/* ── WISHLIST PAGE ───────────────────────────────────── */
.wish-list{padding:0 calc(16px + var(--sr)) 0 calc(16px + var(--sl));display:flex;flex-direction:column;gap:1px}
.wish-item{display:flex;align-items:flex-start;gap:14px;background:var(--bg2);padding:13px 14px;cursor:pointer;position:relative;transition:background .15s}
.wish-item:first-child{border-radius:var(--r) var(--r) 0 0}.wish-item:last-child{border-radius:0 0 var(--r) var(--r)}.wish-item:only-child{border-radius:var(--r)}
.wish-item:not(:last-child)::after{content:'';position:absolute;bottom:0;left:calc(14px+56px+14px);right:0;height:1px;background:var(--bd)}
.wish-item:active{background:var(--bg3)}
.wish-inf{flex:1;min-width:0}
.wish-tit{font-size:15px;font-weight:600;color:var(--t1);line-height:1.3;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.wish-aut{font-size:13px;color:var(--t3);margin-bottom:5px}
.wish-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.wish-fmt{font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
.wish-fmt.fisico{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.wish-fmt.digital{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-bd)}
.wish-fmt.none{background:var(--sf);color:var(--t3);border:1px solid var(--bd)}
.wish-rec{font-size:11px;color:var(--mj);font-weight:500;background:var(--mj-bg);padding:2px 8px;border-radius:20px;border:1px solid var(--mj-bd)}

/* ── EMPTY ───────────────────────────────────────────── */
.empty{text-align:center;padding:70px 20px}
.eic{font-size:52px;opacity:.15;margin-bottom:14px}
.etit{font-size:18px;font-weight:600;color:var(--t2);margin-bottom:6px}
.esub{font-size:14px;color:var(--t3)}

/* ── FAB ─────────────────────────────────────────────── */
.fab{
  position:fixed;bottom:calc(var(--sb)+82px);right:calc(20px + var(--sr));z-index:150;
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;color:#0d0d0f;font-size:26px;font-weight:300;
  box-shadow:0 4px 20px rgba(232,184,75,.45),0 2px 8px rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;transition:transform .2s;line-height:1;cursor:pointer;
}
.fab:active{transform:scale(.9)}

/* ── PAGE HEADER (Stats, Wishlist) ───────────────────── */
.phdr{
  position:sticky;top:0;z-index:100;background:var(--bg);
  padding:calc(var(--st)+14px) calc(20px + var(--sr)) 14px calc(20px + var(--sl));
  border-bottom:1px solid var(--bd);transition:background .3s;
}
.phdr-row{display:flex;align-items:center;justify-content:space-between}
.ptit{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--t1)}

/* ── SECTION TITLE ───────────────────────────────────── */
.sectit{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--t1);padding:20px 0 12px}

/* ── STATS ───────────────────────────────────────────── */
.stat-hero{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--bd);border-radius:var(--rx);padding:24px;margin-bottom:12px;box-shadow:var(--sh1);position:relative;overflow:hidden}
.stat-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,var(--gold-bg) 0%,transparent 70%);pointer-events:none}
.shn{font-family:'Playfair Display',serif;font-size:64px;font-weight:900;color:var(--t1);line-height:1;letter-spacing:-2px}
.shl{font-size:11px;color:var(--t3);font-weight:600;margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.shs{font-size:13px;color:var(--t2);margin-top:10px;line-height:1.7}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.scrd{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:16px;box-shadow:var(--sh0)}

.sheet{background:var(--bg2);border-radius:var(--rx) var(--rx) 0 0;padding-bottom:calc(var(--sb)+24px);width:100%;max-height:95dvh;overflow-y:auto;box-shadow:var(--sh2);animation:sheetUp .32s cubic-bezier(.22,1,.36,1);position:relative;transition:background .3s}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
.sheet-handle{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:14px auto 0}

.dh{position:relative;width:100%;height:260px;overflow:hidden;display:flex;align-items:center;justify-content:center}

// Merge remote → local on auth
async function _loadFb() {
  try {
    const snap = await getDoc(_ref());
    if (snap.exists()) {
      ov = Object.assign({}, snap.data(), ov); // local wins on conflict
      renderLib(); updateNotifDot();
    }
    // Real-time listener — syncs changes from the other user
    onSnapshot(_ref(), snap => {
      if (snap.exists()) {
        ov = Object.assign({}, snap.data(), ov);
        renderLib(); updateNotifDot();
      }
    });
  } catch(e) { console.warn('Firebase load error', e); }
}

// Debounced write to Firestore
let _fbTimer = null;
window._fbPersist = () => {
  clearTimeout(_fbTimer);
  _fbTimer = setTimeout(async () => {
    try { await setDoc(_ref(), ov, { merge: true }); }
    catch(e) { console.warn('Firebase write error', e); }
  }, 800);
};

onAuthStateChanged(_auth, fbUser => {
  if (fbUser) {
    document.getElementById('login-screen')?.remove();

// ════════════════════════════════════════════════════
//  DATA HELPERS
// ════════════════════════════════════════════════════
function getStatus(b, u) {
  u = u || user;
  const s = ov[b.id]?.[u]?.status;
  if (s) return s;
  if (b.pendiente_lista) return 'wish';
  return (u === 'm' ? b.leido_manuel : b.leido_mj) ? 'read' : 'unread';
}
function isRead(b, u)    { return getStatus(b, u||user) === 'read'; }
function isReading(b, u) { return getStatus(b, u||user) === 'reading'; }
function getMyR(b, u)    { return ov[b.id]?.[u||user]?.nota || 0; }
function getCom(b, u)    { return ov[b.id]?.[u||user]?.com || ''; }
function getDate(b, u)   { return ov[b.id]?.[u||user]?.fecha || ''; }
function getGbR(b)       { return gbCache[b.id]?.rating || 0; }
function getCats(b)      { return gbCache[b.id]?.cats || []; }
function getNotifs(u)    { return ov['notifs']?.[u||user] || []; }
function setOv(id, u, d) { if(!ov[id])ov[id]={}; if(!ov[id][u])ov[id][u]={}; Object.assign(ov[id][u],d); persist(); }
function getWishFmt(b, u){ return ov[b.id]?.[u||user]?.wishFmt || ''; }

// Status display
function statusLabel(st) {
  if (st==='read')    return ['read','Leído'];
  if (st==='reading') return ['reading','Leyendo'];
  if (st==='next')    return ['next','Próxima'];
  if (st==='wish')    return ['wish','En deseos'];
  return ['unread','No leído'];
}

// ════════════════════════════════════════════════════
//  VISUALS
// ════════════════════════════════════════════════════
const EMOJIS = ['📖','📚','🗺️','⚔️','🏰','🌿','🕊️','✝️','🔮','🌊','🎭','🏛️','📜','🌙','☀️','🌹','🦁','🐉','🗡️','🌺'];
const BGS_D  = [['#1a3a1a','#0d1f0d'],['#1a1a3a','#0d0d1f'],['#3a1a1a','#1f0d0d'],['#1a2a3a','#0d151f'],['#2a1a3a','#15091f'],['#3a2a1a','#1f150d'],['#1a3a2a','#0d1f15'],['#3a1a2a','#1f0d15'],['#2a3a1a','#151f0d']];
const BGS_L  = [['#c8e8c8','#a0c8a0'],['#c8c8e8','#a0a0c8'],['#e8c8c8','#c8a0a0'],['#c8d8e8','#a0b8c8'],['#d8c8e8','#b8a0c8'],['#e8d8c8','#c8b8a0'],['#c8e8d8','#a0c8b8'],['#e8c8d8','#c8a0b8'],['#d8e8c8','#b8c8a0']];
const em = b => EMOJIS[b.id % EMOJIS.length];
const bg = b => { const arr = isDark ? BGS_D : BGS_L; const p = arr[b.id % arr.length]; return `linear-gradient(160deg,${p[0]},${p[1]})`; };

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}
function starsHtml(n, u, sz) {
  const col = u==='m' ? 'var(--star)' : 'var(--mj)';
  const s = sz || '11px';
  return Array.from({length:10}, (_,i) => `<span class="si" style="font-size:${s};color:${i<n?col:'var(--t4)'}">${i<n?'★':'☆'}</span>`).join('');
}

function updateNotifDot() {
  const n = getNotifs(user).length;
  document.getElementById('notif-dot').classList.toggle('vis', n > 0);
}
function recommend(bookId, fromUser) {
  const toUser = fromUser === 'm' ? 'j' : 'm';
  if (!ov['notifs']) ov['notifs'] = {};
  if (!ov['notifs'][toUser]) ov['notifs'][toUser] = [];
  const already = ov['notifs'][toUser].some(n => n.bookId === bookId && n.from === fromUser);
  if (!already) {
    ov['notifs'][toUser].push({bookId, from:fromUser, ts: Date.now()});
    persist();
  }
  const fromName = fromUser === 'm' ? 'Manuel' : 'Mª Jesús';
  const toName = toUser === 'm' ? 'Manuel' : 'Mª Jesús';
  showToast(`✉️ Recomendado a ${toName}`);
  updateNotifDot();
}
function openNotifs() {
  const notifs = getNotifs(user);
  const el = document.getElementById('notif-body');
  if (!notifs.length) {
    el.innerHTML = '<div class="empty"><div class="eic">✉️</div><div class="etit">Sin recomendaciones</div><div class="esub">Aquí aparecerán los libros que te recomiende la otra persona</div></div>';
  } else {
    el.innerHTML = '<div class="blist">' + notifs.map(n => {
      const b = books.find(x => x.id === n.bookId);
      if (!b) return '';
      const fromName = n.from === 'm' ? 'Manuel' : 'Mª Jesús';
      return `<div class="bitem" onclick="closeSheet('ov-notif');openDetail(${b.id})">
        <div class="thumb"><div class="tbg" style="background:${bg(b)}"></div>
          <img id="inotif-${b.id}" alt="" onerror="this.style.display='none'">
          <span class="tem">${em(b)}</span></div>
        <div class="binf">
          <div class="btit">${b.titulo}</div>
          <div class="baut">${b.autor||'—'}</div>
          <div style="font-size:11px;color:var(--gold);margin-top:4px">📩 Recomendado por ${fromName}</div>
        </div>
        <button style="background:var(--red-bg);border:1px solid var(--red-bd);border-radius:20px;font-size:11px;color:var(--red);padding:4px 10px;font-weight:600;flex-shrink:0"
          onclick="event.stopPropagation();dismissNotif(${n.bookId},'${n.from}')">✕</button>
      </div>`;
    }).join('') + '</div>';
    setTimeout(() => notifs.forEach(n => { if(covCache[n.bookId]){const el=document.getElementById('inotif-'+n.bookId);if(el&&!el.src){el.src=covCache[n.bookId];el.onload=()=>el.classList.add('ok');}} }), 60);
  }
  document.getElementById('ov-notif').classList.add('on');
}
function dismissNotif(bookId, from) {
  if (!ov['notifs']) return;
  ov['notifs'][user] = (ov['notifs'][user]||[]).filter(n => !(n.bookId===bookId && n.from===from));
  persist();
  updateNotifDot();
  openNotifs(); // refresh
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function setPill(p) {

  fN = n;
  document.querySelectorAll('[data-fn]').forEach(el => el.classList.toggle('on', +el.dataset.fn===n));
  renderLib(); updateFiltCount();
}
function setSort(s) {
  fSort = s;
  if (s==='rand') books = shuffle([...books]);
  document.querySelectorAll('[data-sort]').forEach(el => el.classList.toggle('on', el.dataset.sort===s));
  visible=PAGE; renderLib();
}
function toggleDrawer() {
  showFil = !showFil;
  document.getElementById('fdrawer').classList.toggle('on', showFil);
  document.getElementById('filtbtn').classList.toggle('on', showFil);
}
function clearFilters() {
  pill='all'; fN=0; fSort='rand';
  document.getElementById('sq').value='';
  document.getElementById('sc').classList.remove('vis');
  document.getElementById('fautor').value='';
  document.getElementById('fcol').value='';
  document.querySelectorAll('[data-pill]').forEach(el => el.classList.toggle('on', el.dataset.pill==='all'));
  document.querySelectorAll('[data-fn]').forEach(el => el.classList.toggle('on', +el.dataset.fn===0));
  document.querySelectorAll('[data-sort]').forEach(el => el.classList.toggle('on', el.dataset.sort==='rand'));
  books = shuffle([...books]); visible=PAGE; updateFiltCount(); renderLib();
}
function updateFiltCount() {
  const q = document.getElementById('sq')?.value.trim();
  const a = document.getElementById('fautor')?.value;
  const c = document.getElementById('fcol')?.value;
  const n = [pill!=='all', fN>0, !!q, !!a, !!c].filter(Boolean).length;
  const el = document.getElementById('fcnt');
  if (n>0) { el.textContent=n; el.style.display='inline'; } else el.style.display='none';
}
function filterByAuthor(autor) {
  document.getElementById('fautor').value = autor;
  setPill('all'); if (!showFil) toggleDrawer();
  renderLib(); updateFiltCount();
}
function applyFilters(list) {
  const q  = (document.getElementById('sq')?.value||'').toLowerCase().trim();
  const fa = (document.getElementById('fautor')?.value||'').toLowerCase();
  const fc = (document.getElementById('fcol')?.value||'').toLowerCase();
  if (q)  list = list.filter(b => b.titulo.toLowerCase().includes(q)||b.autor.toLowerCase().includes(q)||(b.coleccion||'').toLowerCase().includes(q));
  if (fa) list = list.filter(b => b.autor.toLowerCase()===fa);
  if (fc) list = list.filter(b => (b.coleccion||'').toLowerCase()===fc);
  // pill filter — exclude wish items from library
  const nonWish = list.filter(b => getStatus(b) !== 'wish');
  if (pill==='read')     list = nonWish.filter(b => getStatus(b)==='read');
  else if(pill==='reading')   list = nonWish.filter(b => getStatus(b)==='reading');
  else if(pill==='next')      list = nonWish.filter(b => getStatus(b)==='next');
  else if(pill==='unread')    list = nonWish.filter(b => getStatus(b)==='unread');
  else if(pill==='physical')  list = nonWish.filter(b => b.formato==='fisico');
  else if(pill==='digital')   list = nonWish.filter(b => b.formato==='digital');
  else if(pill==='sagas')     list = nonWish.filter(b => b.coleccion);
  else                         list = nonWish; // 'all' — exclude wish
  if (fN>0) list = list.filter(b => getMyR(b)>=fN || getGbR(b)>=fN);
  if (fSort==='title')    list.sort((a,b) => a.titulo.localeCompare(b.titulo));
  else if(fSort==='author')   list.sort((a,b) => (a.autor||'').localeCompare(b.autor||''));
  else if(fSort==='myrating') list.sort((a,b) => getMyR(b)-getMyR(a));
  else if(fSort==='gbrating') list.sort((a,b) => getGbR(b)-getGbR(a));
  return list;
}

//  RENDER LIBRARY

function renderLib() {
  updateFiltCount();
  const all  = applyFilters([...books]);
  const show = view==='saga' ? all : all.slice(0, visible);
  document.getElementById('rcount').textContent = all.length < books.length
    ? `${all.length} de ${books.filter(b=>getStatus(b)!=='wish').length} libros`
    : `${books.filter(b=>getStatus(b)!=='wish').length} libros`;
  const cont  = document.getElementById('lib-content');
  const empty = document.getElementById('lib-empty');
  const lmw   = document.getElementById('lmwrap');
  if (!all.length) { cont.innerHTML=''; empty.style.display='block'; lmw.style.display='none'; return; }
  empty.style.display = 'none';
  if (view==='list')     cont.innerHTML = listHtml(show);
  else if(view==='grid') cont.innerHTML = gridHtml(show);
  else                   cont.innerHTML = sagaHtml(all);
  lmw.style.display = (view!=='saga' && all.length>visible) ? 'block' : 'none';
  setTimeout(() => loadCovers(show), 80);
}
function loadMore() {
  const all = applyFilters([...books]);
  const prev = visible; visible += PAGE;
  renderLib();
  setTimeout(() => loadCovers(all.slice(prev, visible)), 100);
}

// ── SAGA HTML ────────────────────────────────────────
function sagaHtml(list) {
  const groups={};
  list.filter(b=>b.coleccion).forEach(b=>{if(!groups[b.coleccion])groups[b.coleccion]=[];groups[b.coleccion].push(b);});
  Object.keys(groups).forEach(k=>groups[k].sort((a,b)=>{const ao=parseInt(a.coleccion_orden)||999,bo=parseInt(b.coleccion_orden)||999;return ao-bo;}));
  const nosaga=list.filter(b=>!b.coleccion);
  function prog(bks,u){const tot=bks.length,done=bks.filter(b=>isRead(b,u)).length;return{tot,done,pct:tot?Math.round(done/tot*100):0};}
  let html='<div class="saga-wrap">';
  html+=Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0])).map(([col,bks])=>{
    const pm=prog(bks,'m'),pj=prog(bks,'j');
    return `<div class="saga-blk">
      <div class="saga-hd"><span class="saga-nm">${col}</span><span class="saga-ct">${bks.length} libros</span></div>
      <div class="saga-prog">
        <div class="saga-pu"><div class="saga-pl m">Manuel ${pm.done}/${pm.tot}</div><div class="saga-pb"><div class="saga-pf m" style="width:${pm.pct}%"></div></div></div>
        <div class="saga-pu"><div class="saga-pl j">Mª Jesús ${pj.done}/${pj.tot}</div><div class="saga-pb"><div class="saga-pf j" style="width:${pj.pct}%"></div></div></div>
      </div>
      <div class="saga-list">${bks.map(b=>{
        const st=getStatus(b);const[sc,sl]=statusLabel(st);
        return `<div class="saga-row" data-book-id="${b.id}" onclick="openDetail(${b.id})">
          <div class="saga-th"><div class="saga-th-bg" style="background:${bg(b)}"></div>
            <img id="is-${b.id}" alt="" onerror="this.style.display='none'">
            <span class="saga-th-em">${em(b)}</span></div>
          <div class="saga-vol">${b.coleccion_orden||'·'}</div>
          <div class="saga-inf"><div class="saga-tit">${b.titulo}</div><div class="saga-aut">${b.autor||'—'}</div></div>
          <span class="rbadge ${sc}" style="font-size:10px;padding:3px 8px">${sl}</span>
        </div>`;
      }).join('')}</div>
    </div>`;
  }).join('');
  if(nosaga.length) html+=`<div class="saga-blk">
    <div class="saga-hd"><span class="saga-nm">Sin colección</span><span class="saga-ct">${nosaga.length}</span></div>
    <div class="saga-list">${nosaga.slice(0,30).map(b=>{
      const st=getStatus(b);const[sc,sl]=statusLabel(st);
      return `<div class="saga-row" data-book-id="${b.id}" onclick="openDetail(${b.id})">
        <div class="saga-th"><div class="saga-th-bg" style="background:${bg(b)}"></div>
          <img id="is2-${b.id}" alt="" onerror="this.style.display='none'">
          <span class="saga-th-em">${em(b)}</span></div>
        <div class="saga-vol">·</div>
        <div class="saga-inf"><div class="saga-tit">${b.titulo}</div><div class="saga-aut">${b.autor||'—'}</div></div>
        <span class="rbadge ${sc}" style="font-size:10px;padding:3px 8px">${sl}</span>
      </div>`;
    }).join('')}</div>
  </div>`;
  html+='</div>';
  return html;
}

function renderWish() {
  const list = books.filter(b => getStatus(b,'m')==='wish' || getStatus(b,'j')==='wish');
  const myWish = list.filter(b => getStatus(b,user)==='wish');
  const el = document.getElementById('wish-content');

    el.innerHTML='<div class="empty"><div class="eic">⭐</div><div class="etit">Lista de deseos vacía</div><div class="esub">Añade libros que quieras conseguir</div></div>';
    return;
  }
  el.innerHTML = '<div class="wish-list">' + myWish.map(b => {
    const wf = getWishFmt(b,user);
    const fmtCls = wf==='fisico'?'fisico':wf==='digital'?'digital':'none';
    const fmtLbl = wf==='fisico'?'📗 Físico':wf==='digital'?'📱 Digital':'Formato sin definir';
    const notifs = getNotifs(user);
    const isRec = notifs.some(n => n.bookId === b.id);
    return `<div class="wish-item" onclick="openDetail(${b.id})">
      <div class="thumb"><div class="tbg" style="background:${bg(b)}"></div>
        <img id="iw-${b.id}" alt="" onerror="this.style.display='none'">
        <span class="tem">${em(b)}</span></div>
      <div class="wish-inf">
        <div class="wish-tit">${b.titulo}</div>
        <div class="wish-aut">${b.autor||'—'}</div>
        <div class="wish-meta">
          <span class="wish-fmt ${fmtCls}">${fmtLbl}</span>
          ${isRec?'<span class="wish-rec">✉️ Recomendado</span>':''}

// ════════════════════════════════════════════════════
//  COVERS + GOOGLE BOOKS DATA
// ════════════════════════════════════════════════════
const covCache={}, gbCache={}, synCache={};

async function loadCovers(list) {
  for (const b of list.slice(0,30)) {
    if (covCache[b.id]!==undefined) { if(covCache[b.id]) applyImg(b.id,covCache[b.id]); }
    else fetchData(b);
  }
}
async function fetchData(b) {
  covCache[b.id]=null;
  try {
    const ln=(b.autor||'').split(' ').pop();
    const q=encodeURIComponent(`intitle:"${b.titulo}" inauthor:"${ln}"`);
    const r=await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=3&langRestrict=es&fields=items(volumeInfo(title,imageLinks,averageRating,description,categories,language))`,{cache:'force-cache'});
    if(!r.ok) throw 0;
    const d=await r.json();
    const items=d.items||[];
    const best=items.find(it=>it.volumeInfo?.language==='es')||items[0];
    if(!best) throw 0;
    const info=best.volumeInfo;
    const thumb=info.imageLinks?.thumbnail||info.imageLinks?.smallThumbnail;
    if(thumb){covCache[b.id]=thumb.replace('http://','https://').replace('&edge=curl','').replace('zoom=1','zoom=2');applyImg(b.id,covCache[b.id]);}
    if(!gbCache[b.id]) gbCache[b.id]={};
    if(info.averageRating) gbCache[b.id].rating=Math.round(info.averageRating*2);
    if(info.categories)    gbCache[b.id].cats=info.categories.slice(0,3).map(c=>c.split('/')[0].trim());
    if(info.description&&!synCache[b.id]) synCache[b.id]=info.description.replace(/<[^>]+>/g,'').trim();
    updateCardRating(b);
  } catch {
    try {
      const q2=encodeURIComponent(b.titulo+' '+(b.autor||''));
      const r2=await fetch(`https://openlibrary.org/search.json?q=${q2}&limit=1&fields=cover_i,first_sentence`,{cache:'force-cache'});
      if(!r2.ok) return;
      const d2=await r2.json();
      const doc=(d2.docs||[])[0]||{};
      if(doc.cover_i){covCache[b.id]=`https://covers.openlibrary.org/b/id/${doc.cover_i}-L.jpg`;applyImg(b.id,covCache[b.id]);}
      let s=doc.first_sentence;if(typeof s==='object')s=s?.value;
      if(s&&!synCache[b.id])synCache[b.id]=s;
    } catch {}
  }
}

function applyImg(id, url) {
  ['il-','ig-','is-','is2-','db-','iw-','inotif-','icr-'].forEach(pfx=>{
    const el=document.getElementById(pfx+id);
    if(el&&!el.src){el.src=url;el.onload=()=>el.classList.add('ok');}
  });
  // dbl- always (blur bg)
  const dbl=document.getElementById('dbl-'+id);
  if(dbl){dbl.src=url;dbl.onload=()=>dbl.classList.add('ok');}
  // dci - cover img
  const dci=document.getElementById('dci-'+id);
  if(dci&&!dci.src){dci.src=url;dci.onload=()=>dci.classList.add('ok');}
}

function updateCardRating(b) {
  const myR=getMyR(b),gbR=getGbR(b),dispR=myR>0?myR:gbR;
  if(!dispR) return;
  const ru=myR>0?user:'m', lbl=myR>0?'Tu nota':'Google Books';
  document.querySelectorAll(`[data-book-id="${b.id}"]`).forEach(item=>{
    const sw=item.querySelector('.bstars');
    if(sw){sw.style.display='flex';sw.innerHTML=`<div class="stars">${starsHtml(dispR,ru,'11px')}</div><span class="snum">${dispR}/10</span><span class="ssrc">${lbl}</span>`;}
    const gs=item.querySelector('.gstars');
    if(gs) gs.innerHTML=starsHtml(dispR,ru,'8px');
  });
}

function checkSagaSuggest(){
  const tit=(document.getElementById('a-t').value||'').toLowerCase().trim();
  const aut=(document.getElementById('a-a').value||'').toLowerCase().trim();
  const el=document.getElementById('saga-sug');
  sugCol=null;sugOrd=null;
  if(!tit&&!aut){el.classList.remove('vis');return;}
  for(const[col,data]of Object.entries(COL_DATA)){
    const authM=aut&&data.authors.some(a=>a.toLowerCase().includes(aut)||aut.includes(a.toLowerCase().split(' ').pop()));
    const titM=col.toLowerCase().split(' ').some(w=>w.length>3&&tit.includes(w));
    if(authM&&(titM||tit.length<4)){
      sugCol=col;sugOrd=data.max_order+1;
      el.innerHTML=`💡 ¿Pertenece a <strong>${col}</strong>? Pulsa para añadir como vol. ${sugOrd}`;
      el.classList.add('vis');return;
    }
  }
  el.classList.remove('vis');
}
function acceptSuggest(){
  if(!sugCol)return;
  document.getElementById('a-c').value=sugCol;
  document.getElementById('a-o').value=sugOrd||'';
  document.getElementById('saga-sug').classList.remove('vis');
}
function submitBook(){
  const t=document.getElementById('a-t').value.trim();
  if(!t){showToast('⚠️ El título es obligatorio');return;}
  if(editingId){
    // Edit existing
    const b=books.find(x=>x.id===editingId);
    if(b){
      b.titulo=t;
      b.autor=document.getElementById('a-a').value.trim();
      b.formato=document.getElementById('a-f').value;
      b.coleccion=document.getElementById('a-c').value.trim()||null;
      b.coleccion_orden=document.getElementById('a-o').value.trim()||null;
      // clear cover cache to re-fetch
      delete covCache[editingId];
      delete gbCache[editingId];
      delete synCache[editingId];
    }
    showToast('✓ Libro actualizado');
  } else {
    const isWish=addType==='wish';
    const newBook={
      id:nid++, autor:document.getElementById('a-a').value.trim(), titulo:t,
      leido_manuel:false, leido_mj:false,
      formato:isWish?'digital':document.getElementById('a-f').value,
      coleccion:isWish?null:(document.getElementById('a-c').value.trim()||null),
      coleccion_orden:isWish?null:(document.getElementById('a-o').value.trim()||null),
      pendiente_lista:isWish
    };
    books.unshift(newBook);
    if(isWish){
      const wf=document.getElementById('a-wf').value;
      setOv(newBook.id,user,{status:'wish',wishFmt:wf});
    }
    showToast(isWish?'⭐ Añadido a la lista de deseos':'📚 Libro añadido');
  }
  ['a-t','a-a','a-c','a-o'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('saga-sug').classList.remove('vis');
  closeSheet('ov-add');
  renderLib();
  if(document.getElementById('page-wish').classList.contains('on')) renderWish();
}

      <div class="scrd"><div class="slbl">Mª Jesús</div><div class="sval mj">${lj}</div><div class="ssub">Leídos · ${rj} leyendo<br>Media: ${avg('j')||'—'}</div></div>

    <div class="sectit">Mª Jesús recomienda a Manuel</div><div class="xsec">${crossHtml('j','m')}</div>

}
function topHtml(u){
  const list=books.filter(b=>isRead(b,u)&&getMyR(b,u)>0).sort((a,b)=>getMyR(b,u)-getMyR(a,u)).slice(0,5);
  if(!list.length)return`<div style="padding:16px;font-size:14px;color:var(--t3)">Sin valoraciones aún</div>`;
  const col=u==='m'?'var(--gold)':'var(--mj)';
  return list.map((b,i)=>`<div class="srow" onclick="openDetail(${b.id})"><div class="srnk">${i+1}</div><div class="srinf"><div class="srtit">${b.titulo}</div><div class="sraut">${b.autor||'—'}</div></div><div class="srnota" style="color:${col}">${getMyR(b,u)}</div></div>`).join('');
}
function crossHtml(from,to){
  const fromName=from==='m'?'Manuel':'Mª Jesús',toName=to==='m'?'Manuel':'Mª Jesús';
  const list=books.filter(b=>isRead(b,from)&&!isRead(b,to)&&getMyR(b,from)>0).sort((a,b)=>getMyR(b,from)-getMyR(a,from)).slice(0,8);
  if(!list.length)return`<div style="padding:16px;font-size:14px;color:var(--t3)">${fromName} necesita valorar libros que ${toName} no haya leído</div>`;
  return list.map(b=>`<div class="xrow" onclick="openDetail(${b.id})"><div class="xthumb"><div class="xtbg" style="background:${bg(b)}"></div><img id="icr-${b.id}" alt="" onerror="this.style.display='none'"><span class="xtem">${em(b)}</span></div><div class="xinf"><div class="xtit">${b.titulo}</div><div class="xaut">${b.autor||'—'}</div><span class="xtag ${from}">${getMyR(b,from)}/10 · ${fromName}</span></div></div>`).join('');
}

function exportCsv(){
  const rows=['ID,Título,Autor,Formato,Colección,Orden,Estado M,Nota M,Fecha M,Nota M,Estado MJ,Nota MJ,Fecha MJ,Deseos'];
  books.forEach(b=>{
    const e=s=>'"'+(s||'').replace(/"/g,'""')+'"';
    rows.push([b.id,e(b.titulo),e(b.autor),b.formato,e(b.coleccion),b.coleccion_orden||'',getStatus(b,'m'),getMyR(b,'m')||'',getDate(b,'m'),getCom(b,'m'),getStatus(b,'j'),getMyR(b,'j')||'',getDate(b,'j'),b.pendiente_lista?1:0].join(','));
  });
  const blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='codex.csv';a.click();
}
